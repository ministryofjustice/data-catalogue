name: Datahub Cleanup Ingestion
permissions:
  id-token: write
  contents: read
on:
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: "Environment to use for secrets"
        required: true
        type: string
    secrets:
      DATAHUB_GMS_TOKEN:
        description: "API Key for datahub GMS"
        required: true

  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "Environment to use for secrets"
        required: true
        type: string
    secrets:
      DATAHUB_GMS_TOKEN:
        description: "API Key for datahub GMS"
        required: true

jobs:
  run-datahub-cleanup:
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UV
        id: setup-uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: ${{ vars.UV_VERSION }}
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install Project Dependencies
        run: uv sync --locked

      - name: Run Datahub Cleanup Ingestion
        id: datahub-cleanup-ingestion
        env:
          DATAHUB_GMS_URL: ${{ vars.DATAHUB_GMS_URL }}
          DATAHUB_GMS_TOKEN: ${{ secrets.DATAHUB_GMS_TOKEN }}
        run: time uv run datahub ingest -c ingestion/datahub-cleanup.yaml
